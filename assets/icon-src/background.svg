<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Adaptive-icon background layer: the app's dark ground with a soft glow
       toward the upper-center, so the mark sits on subtle depth, not flat black. -->
  <defs>
    <radialGradient id="ground" cx="50%" cy="38%" r="72%">
      <stop offset="0" stop-color="#1B2233"/>
      <stop offset="0.55" stop-color="#111624"/>
      <stop offset="1" stop-color="#0B0F1A"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#ground)"/>
</svg>
